  # ===========================================================================
  # TARGET HOSTS (172.20.1.0/24) - Realistic multi-service machines
  # ===========================================================================

  # Web Server: SSH(22), HTTP(80), MySQL(3306), Dev Portal(8888)
  webserver:
    build: ./targets/webserver
    hostname: web.corp.local
    networks:
      target_net:
        ipv4_address: 172.20.1.10
    restart: unless-stopped

  # Mail Server: SSH(22), SMTP(25), POP3(110), IMAP(143), Webmail(443)
  mailserver:
    build: ./targets/mailserver
    hostname: mail.corp.local
    networks:
      target_net:
        ipv4_address: 172.20.1.20
    restart: unless-stopped

  # File Server: FTP(21), SSH(22), SMB(139,445)
  fileserver:
    build: ./targets/fileserver
    hostname: files.corp.local
    cap_add:
      - SYS_CHROOT
    networks:
      target_net:
        ipv4_address: 172.20.1.30
    restart: unless-stopped

  # Database Server: SSH(22), MySQL(3306), PostgreSQL(5432), Redis(6379)
  database:
    build: ./targets/database
    hostname: db.corp.local
    networks:
      target_net:
        ipv4_address: 172.20.1.40
    restart: unless-stopped

  # Developer Workstation: SSH(2222), DNS(5353), Apps(4444,5555,6666,9999)
  devbox:
    build: ./targets/devbox
    hostname: dev.corp.local
    networks:
      target_net:
        ipv4_address: 172.20.1.50
    restart: unless-stopped

  # Hardened Host: Port2, SSH(22222), Elite(31337), Slow(65000), UDP(4444)
  # ICMP blocked - requires -Pn
  hardened:
    build: ./targets/hardened
    hostname: ghost.corp.local
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      target_net:
        ipv4_address: 172.20.1.60
    restart: unless-stopped


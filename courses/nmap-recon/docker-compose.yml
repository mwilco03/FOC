  # ===========================================================================
  # CTFd (Scoreboard & Challenges)
  # ===========================================================================

  ctfd:
    image: ctfd/ctfd:3.7.0
    environment:
      - SECRET_KEY=${CTFD_SECRET_KEY}
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@ctfd-db/${MYSQL_DATABASE}
      - REDIS_URL=redis://ctfd-redis:6379
      - REVERSE_PROXY=true
    ports:
      - "8000:8000"
    depends_on:
      ctfd-db:
        condition: service_healthy
      ctfd-redis:
        condition: service_healthy
    networks:
      ctfd_net:
        ipv4_address: 172.20.2.10
    restart: unless-stopped

  ctfd-db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ctfd-db-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --wait_timeout=28800
      --log-warnings=0
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      ctfd_net:
        ipv4_address: 172.20.2.20
    restart: unless-stopped

  ctfd-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      ctfd_net:
        ipv4_address: 172.20.2.30
    restart: unless-stopped

  # ===========================================================================
  # Lab Controller (auto-unlock, slides, solution guide)
  # ===========================================================================
  lab-controller:
    build: ./lab-controller
    environment:
      - CTFD_URL=http://ctfd:8000
      - CTFD_ADMIN_USER=admin
      - CTFD_ADMIN_PASS=NmapLab2024!
      - SOLUTION_PASSWORD=${SOLUTION_PASSWORD:-instructor2024}
      - UNLOCK_THRESHOLD=0.5
      - START_LOCKED=true
      - POLL_INTERVAL=10
      - CTF_DURATION_MINUTES=${CTF_DURATION_MINUTES:-120}
      - CTF_EXTEND_MINUTES=${CTF_EXTEND_MINUTES:-60}
    ports:
      - "8888:8080"
    depends_on:
      - ctfd
    networks:
      ctfd_net:
        ipv4_address: 172.20.2.40
    restart: unless-stopped

volumes:
  ctfd-db-data:

# =============================================================================
# Nmap Training Lab - Docker Compose
# =============================================================================

networks:
  student_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  target_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24
  ctfd_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.2.0/24

# =============================================================================
# TRAEFIK - Load Balancer with Sticky Sessions
# =============================================================================
services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      # Direct per-student ports
      - "--entrypoints.s1.address=:4201"
      - "--entrypoints.s2.address=:4202"
      - "--entrypoints.s3.address=:4203"
      - "--entrypoints.s4.address=:4204"
      - "--entrypoints.s5.address=:4205"
      - "--entrypoints.s6.address=:4206"
      - "--entrypoints.s7.address=:4207"
      - "--entrypoints.s8.address=:4208"
      - "--entrypoints.s9.address=:4209"
      - "--entrypoints.s10.address=:4210"
    ports:
      - "80:80"
      - "8080:8080"
      - "4201:4201"
      - "4202:4202"
      - "4203:4203"
      - "4204:4204"
      - "4205:4205"
      - "4206:4206"
      - "4207:4207"
      - "4208:4208"
      - "4209:4209"
      - "4210:4210"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      student_net:
        ipv4_address: 172.20.0.2
    restart: unless-stopped

  # ===========================================================================
  # STUDENT TERMINALS (10 instances)
  # ===========================================================================
  student-1:
    build: ./student-terminal
    hostname: nmap-lab
    env_file: ./student.env
    cap_add:
      - NET_RAW
      - NET_ADMIN
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.students.rule=PathPrefix(`/`)"
      - "traefik.http.routers.students.entrypoints=web"
      - "traefik.http.routers.students.service=student-pool"
      - "traefik.http.services.student-pool.loadbalancer.sticky.cookie.name=_student_session"
      - "traefik.http.services.student-pool.loadbalancer.sticky.cookie.httpOnly=true"
      - "traefik.http.services.student-pool.loadbalancer.server.port=4200"
      - "traefik.http.routers.student1-direct.rule=PathPrefix(`/`)"
      - "traefik.http.routers.student1-direct.entrypoints=s1"
      - "traefik.http.routers.student1-direct.service=student1-svc"
      - "traefik.http.services.student1-svc.loadbalancer.server.port=4200"
    networks:
      student_net:
        ipv4_address: 172.20.0.11
      target_net:
        ipv4_address: 172.20.1.201
    restart: unless-stopped


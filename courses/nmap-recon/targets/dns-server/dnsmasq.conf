# DNS Training Lab Server
port=53
listen-address=0.0.0.0
no-resolv
user=root

# A records for the lab
address=/web.training.lab/172.20.1.10
address=/mail.training.lab/172.20.1.30
address=/ftp.training.lab/172.20.1.40

# TXT record with flag
txt-record=flag.training.lab,"FLAG{dns_txt_record_found}"
txt-record=training.lab,"Nmap Training Lab DNS Server"

# Log queries
log-queries

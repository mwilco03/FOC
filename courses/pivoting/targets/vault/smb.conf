[global]
   workgroup = PIVOT
   server string = VAULT Samba Server
   security = user
   map to guest = Bad User
   log file = /var/log/samba/%m.log
   max log size = 50

   # SMB protocol settings
   server min protocol = SMB2
   client min protocol = SMB2

[public]
   comment = Public Share
   path = /srv/samba/public
   browseable = yes
   read only = yes
   guest ok = yes

[backup]
   comment = Backup Share
   path = /srv/samba/backup
   browseable = yes
   read only = yes
   guest ok = yes

[classified]
   comment = Classified Data (Authentication Required)
   path = /srv/samba/classified
   browseable = no
   read only = yes
   guest ok = no
   valid users = vaultadmin

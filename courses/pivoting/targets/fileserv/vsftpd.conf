# vsftpd configuration for FILESERV

# Anonymous access enabled
anonymous_enable=YES
anon_root=/srv/ftp

# Disable local users
local_enable=NO

# Read only
write_enable=NO

# Other settings
listen=YES
listen_ipv6=NO
seccomp_sandbox=NO

# Logging
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log

# Banner
ftpd_banner=FILESERV FTP Server

input {
  file {
    path => "/zeek-logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["zeek"]
    codec => "json"
  }
}

filter {
  if "zeek" in [tags] {
    # Zeek JSON logs have a _path field indicating log type
    if [_path] {
      mutate { add_field => { "zeek_log_type" => "%{_path}" } }
    }

    # Parse Zeek timestamp (epoch float)
    if [ts] {
      date {
        match => ["ts", "UNIX"]
        target => "@timestamp"
      }
    }
  }
}

output {
  if "zeek" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "zeek-%{+YYYY.MM.dd}"
    }
  }
}

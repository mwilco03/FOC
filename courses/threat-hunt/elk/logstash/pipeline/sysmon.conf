input {
  beats {
    port => 5044
    tags => ["winlogbeat"]
  }
}

filter {
  if "winlogbeat" in [tags] {
    # Sysmon events
    if [winlog][channel] == "Microsoft-Windows-Sysmon/Operational" {
      mutate { add_tag => ["sysmon"] }

      # Parse event ID into human-readable name
      translate {
        field => "[winlog][event_id]"
        destination => "[sysmon][event_type]"
        dictionary => {
          "1"  => "ProcessCreate"
          "2"  => "FileCreateTime"
          "3"  => "NetworkConnect"
          "4"  => "ServiceStateChange"
          "5"  => "ProcessTerminate"
          "6"  => "DriverLoaded"
          "7"  => "ImageLoaded"
          "8"  => "CreateRemoteThread"
          "10" => "ProcessAccess"
          "11" => "FileCreate"
          "12" => "RegistryCreate"
          "13" => "RegistryValueSet"
          "15" => "FileCreateStreamHash"
          "22" => "DNSEvent"
          "25" => "ProcessTampering"
        }
        fallback => "Unknown"
      }
    }

    # Windows Security events
    if [winlog][channel] == "Security" {
      mutate { add_tag => ["winsec"] }
    }

    # AppLocker events
    if [winlog][channel] =~ /AppLocker/ {
      mutate { add_tag => ["applocker"] }
    }
  }
}

output {
  if "sysmon" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "sysmon-%{+YYYY.MM.dd}"
    }
  }
  else if "winsec" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "winsec-%{+YYYY.MM.dd}"
    }
  }
  else if "applocker" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "applocker-%{+YYYY.MM.dd}"
    }
  }
  else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "winlogbeat-%{+YYYY.MM.dd}"
    }
  }
}

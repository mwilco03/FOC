<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCAP Forensics - NetDrill</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#1a2235;--border:#2a3650;--text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;--accent-blue:#3b82f6;--accent-cyan:#06b6d4;--accent-green:#10b981;--accent-amber:#f59e0b;--accent-red:#ef4444;--accent-purple:#8b5cf6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:1rem;}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid var(--border);margin-bottom:1rem;}
.top-bar a{color:var(--text-muted);text-decoration:none;font-size:0.75rem;}
.top-bar a:hover{color:var(--accent-cyan);}
.top-bar h1{font-family:'Press Start 2P',monospace;font-size:0.85rem;color:var(--accent-red);}

.scenario-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;}
.scenario-bar .info{font-size:0.75rem;color:var(--text-muted);}
.scenario-bar .info strong{color:var(--accent-cyan);}
.scenario-bar .score-area{display:flex;gap:1rem;font-family:'Press Start 2P',monospace;font-size:0.55rem;}
.scenario-bar .score-area .val{color:var(--accent-green);}
.scenario-bar .score-area .hint-count{color:var(--accent-amber);}

.mission-panel{background:linear-gradient(135deg,rgba(239,68,68,0.05),rgba(139,92,246,0.05));border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:1rem;margin-bottom:1rem;}
.mission-panel h3{font-family:'Press Start 2P',monospace;font-size:0.6rem;color:var(--accent-red);margin-bottom:0.5rem;}
.mission-panel p{font-size:0.78rem;color:var(--text-secondary);line-height:1.6;}

.checklist{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0.5rem;margin-bottom:1rem;}
.check-item{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:0.6rem 0.8rem;font-size:0.72rem;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:0.5rem;transition:all 0.2s;}
.check-item:hover{border-color:var(--accent-blue);}
.check-item .check-icon{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.5rem;transition:all 0.2s;}
.check-item.found{border-color:var(--accent-green);color:var(--accent-green);}
.check-item.found .check-icon{border-color:var(--accent-green);background:var(--accent-green);color:#fff;}
.check-item.wrong{animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

.pcap-viewer{background:#0d1117;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.pcap-toolbar{display:flex;gap:0.5rem;padding:0.5rem;border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap;}
.pcap-toolbar input{flex:1;min-width:200px;font-family:'JetBrains Mono',monospace;font-size:0.75rem;padding:0.4rem 0.6rem;background:var(--bg-primary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);outline:none;}
.pcap-toolbar input:focus{border-color:var(--accent-blue);}
.pcap-toolbar button{font-family:'JetBrains Mono',monospace;font-size:0.65rem;padding:0.4rem 0.8rem;border-radius:4px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;}
.pcap-toolbar button:hover{border-color:var(--accent-blue);}
.pcap-toolbar button.active{background:var(--accent-blue);border-color:var(--accent-blue);color:#fff;}
.pcap-toolbar .filter-count{font-size:0.65rem;color:var(--text-muted);}

.pcap-header{display:grid;grid-template-columns:50px 80px 160px 160px 60px 55px auto;gap:0;padding:0 0.5rem;background:var(--bg-secondary);font-size:0.65rem;color:var(--text-muted);border-bottom:1px solid var(--border);}
.pcap-header div{padding:0.35rem 0.25rem;font-weight:700;white-space:nowrap;}

.pcap-body{max-height:400px;overflow-y:auto;}
.pkt-row{display:grid;grid-template-columns:50px 80px 160px 160px 60px 55px auto;gap:0;padding:0 0.5rem;font-size:0.68rem;border-bottom:1px solid rgba(42,54,80,0.3);cursor:pointer;transition:background 0.1s;}
.pkt-row:hover{background:rgba(59,130,246,0.08);}
.pkt-row.selected{background:rgba(59,130,246,0.15);border-color:var(--accent-blue);}
.pkt-row.highlighted{background:rgba(16,185,129,0.1);}
.pkt-row.suspicious{background:rgba(239,68,68,0.06);}
.pkt-row div{padding:0.3rem 0.25rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pkt-row .col-no{color:var(--text-muted);}
.pkt-row .col-time{color:var(--text-muted);}
.pkt-row .col-src{color:var(--accent-cyan);}
.pkt-row .col-dst{color:var(--accent-purple);}
.pkt-row .col-proto{color:var(--accent-amber);font-weight:600;}
.pkt-row .col-len{color:var(--text-muted);}
.pkt-row .col-info{color:var(--text-secondary);}

.detail-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-top:0.75rem;overflow:hidden;display:none;}
.detail-panel.visible{display:block;}
.detail-tabs{display:flex;border-bottom:1px solid var(--border);}
.detail-tab{font-size:0.65rem;padding:0.5rem 1rem;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;}
.detail-tab.active{color:var(--accent-cyan);border-bottom-color:var(--accent-cyan);}
.detail-content{padding:0.75rem;font-size:0.72rem;line-height:1.6;max-height:250px;overflow-y:auto;}
.detail-content pre{background:var(--bg-primary);padding:0.5rem;border-radius:4px;white-space:pre-wrap;word-break:break-all;font-size:0.7rem;}
.detail-content .field{margin-bottom:0.3rem;}
.detail-content .field-name{color:var(--accent-cyan);font-weight:600;}
.detail-content .field-val{color:var(--text-secondary);}
.detail-content .suspicious-val{color:var(--accent-red);font-weight:600;background:rgba(239,68,68,0.1);padding:1px 4px;border-radius:3px;}

.submit-area{margin-top:1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1rem;}
.submit-area label{font-size:0.75rem;color:var(--text-muted);display:block;margin-bottom:0.4rem;}
.submit-area input{width:100%;font-family:'JetBrains Mono',monospace;font-size:0.8rem;padding:0.5rem;background:#0d1117;border:1px solid var(--border);border-radius:6px;color:var(--text-primary);outline:none;margin-bottom:0.5rem;}
.submit-area input:focus{border-color:var(--accent-blue);}
.submit-area button{font-family:'Press Start 2P',monospace;font-size:0.55rem;padding:0.6rem 1.2rem;border-radius:6px;border:none;cursor:pointer;background:var(--accent-blue);color:#fff;margin-right:0.5rem;}
.submit-area button:hover{background:#2563eb;}
.submit-area .hint-btn{background:var(--accent-amber);color:#000;}
.submit-area .hint-btn:hover{background:#d97706;}
.feedback-msg{font-family:'Press Start 2P',monospace;font-size:0.55rem;min-height:1.5em;margin-top:0.5rem;}
.feedback-msg.correct{color:var(--accent-green);}
.feedback-msg.wrong{color:var(--accent-red);}
.feedback-msg.hint{color:var(--accent-amber);}

.victory{text-align:center;padding:2rem;display:none;}
.victory.visible{display:block;}
.victory h2{font-family:'Press Start 2P',monospace;font-size:1rem;color:var(--accent-green);margin-bottom:1rem;}
.victory p{font-size:0.78rem;color:var(--text-secondary);margin-bottom:0.5rem;}

.scenario-select{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.scenario-btn{font-family:'Press Start 2P',monospace;font-size:0.5rem;padding:0.5rem 1rem;border:1px solid var(--border);border-radius:999px;background:var(--bg-secondary);color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
.scenario-btn:hover{border-color:var(--accent-blue);color:var(--text-primary);}
.scenario-btn.active{background:var(--accent-red);border-color:var(--accent-red);color:#fff;}
.scenario-btn.completed{background:rgba(16,185,129,0.1);border-color:var(--accent-green);color:var(--accent-green);}

@media(max-width:800px){
  .pcap-header,.pkt-row{grid-template-columns:40px 60px 120px 120px 50px 45px auto;font-size:0.6rem;}
  .checklist{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <a href="../index.html">&larr; Back</a>
    <h1>PCAP FORENSICS</h1>
    <span style="font-size:0.6rem;color:var(--text-muted);">HUNT</span>
  </div>

  <div class="scenario-select" id="scenarioSelect"></div>

  <div class="scenario-bar">
    <div class="info">Scenario: <strong id="scenarioName">Loading...</strong></div>
    <div class="score-area">
      <div>FOUND: <span class="val" id="foundCount">0</span>/<span id="totalCount">0</span></div>
      <div>SCORE: <span class="val" id="totalScore">0</span></div>
      <div>HINTS: <span class="hint-count" id="hintsUsed">0</span></div>
    </div>
  </div>

  <div class="mission-panel">
    <h3>MISSION BRIEFING</h3>
    <p id="missionText">Loading scenario...</p>
  </div>

  <div class="checklist" id="checklist"></div>

  <div class="pcap-viewer">
    <div class="pcap-toolbar">
      <input type="text" id="filterInput" placeholder="Filter: ip.src, tcp.port, http, dns, etc.">
      <button id="filterBtn">Apply</button>
      <button id="clearFilter">Clear</button>
      <span class="filter-count" id="filterCount"></span>
    </div>
    <div class="pcap-header">
      <div>No.</div><div>Time</div><div>Source</div><div>Destination</div><div>Proto</div><div>Len</div><div>Info</div>
    </div>
    <div class="pcap-body" id="pcapBody"></div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-tabs">
      <div class="detail-tab active" data-view="headers">Headers</div>
      <div class="detail-tab" data-view="payload">Payload</div>
      <div class="detail-tab" data-view="hex">Hex Dump</div>
    </div>
    <div class="detail-content" id="detailContent"></div>
  </div>

  <div class="submit-area">
    <label>Enter your finding (e.g., "nmap scan from 10.0.0.50", "password: admin123"):</label>
    <input type="text" id="answerInput" placeholder="Type what you found...">
    <button id="submitBtn">SUBMIT</button>
    <button class="hint-btn" id="hintBtn">HINT</button>
    <div class="feedback-msg" id="feedbackMsg"></div>
  </div>

  <div class="victory" id="victoryScreen">
    <h2>INVESTIGATION COMPLETE!</h2>
    <p id="victoryStats"></p>
    <button style="font-family:'Press Start 2P',monospace;font-size:0.55rem;padding:0.6rem 1.2rem;border-radius:6px;border:none;cursor:pointer;background:var(--accent-blue);color:#fff;margin-top:1rem;" id="nextScenarioBtn">NEXT SCENARIO</button>
  </div>
</div>

// =====================================================================
// GAME STATE
// =====================================================================
let currentScenario = 0;
let foundItems = {};
let score = 0;
let hintsUsed = 0;
let selectedPacket = null;
let currentView = 'headers';
let filteredPackets = null;
let completedScenarios = new Set();

function init() {
  renderScenarioSelect();
  loadScenario(currentScenario);
}

function renderScenarioSelect() {
  const el = document.getElementById('scenarioSelect');
  el.innerHTML = SCENARIOS.map((s, i) =>
    `<button class="scenario-btn ${i === currentScenario ? 'active' : ''} ${completedScenarios.has(i) ? 'completed' : ''}" data-idx="${i}">${i + 1}: ${s.name}</button>`
  ).join('');
  el.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentScenario = parseInt(btn.dataset.idx);
      loadScenario(currentScenario);
    });
  });
}

function loadScenario(idx) {
  const s = SCENARIOS[idx];
  foundItems = {};
  score = 0;
  hintsUsed = 0;
  selectedPacket = null;
  filteredPackets = null;

  document.getElementById('scenarioName').textContent = s.name;
  document.getElementById('missionText').textContent = s.mission;
  document.getElementById('totalCount').textContent = s.findings.length;
  document.getElementById('victoryScreen').classList.remove('visible');

  updateScoreDisplay();
  renderChecklist();
  renderPackets();
  renderScenarioSelect();

  document.getElementById('detailPanel').classList.remove('visible');
  document.getElementById('filterInput').value = '';
  document.getElementById('filterCount').textContent = '';
  document.getElementById('feedbackMsg').textContent = '';
  document.getElementById('answerInput').value = '';
}

function renderChecklist() {
  const s = SCENARIOS[currentScenario];
  const el = document.getElementById('checklist');
  el.innerHTML = s.findings.map(f =>
    `<div class="check-item ${foundItems[f.id] ? 'found' : ''}" data-id="${f.id}">
      <div class="check-icon">${foundItems[f.id] ? '✓' : ''}</div>
      <span>${f.label} ${foundItems[f.id] ? '(+' + f.points + ')' : ''}</span>
    </div>`
  ).join('');
}

function renderPackets(packets) {
  const pkts = packets || SCENARIOS[currentScenario].packets;
  const body = document.getElementById('pcapBody');
  body.innerHTML = pkts.map(p =>
    `<div class="pkt-row ${selectedPacket === p.no ? 'selected' : ''}" data-no="${p.no}">
      <div class="col-no">${p.no}</div>
      <div class="col-time">${p.time}</div>
      <div class="col-src">${p.src}</div>
      <div class="col-dst">${p.dst}</div>
      <div class="col-proto">${p.proto}</div>
      <div class="col-len">${p.len}</div>
      <div class="col-info">${p.info}</div>
    </div>`
  ).join('');

  body.querySelectorAll('.pkt-row').forEach(row => {
    row.addEventListener('click', () => selectPacket(parseInt(row.dataset.no)));
  });
}

function selectPacket(no) {
  const s = SCENARIOS[currentScenario];
  const pkt = s.packets.find(p => p.no === no);
  if (!pkt) return;
  selectedPacket = no;

  // Re-render to highlight
  const pkts = filteredPackets || s.packets;
  renderPackets(pkts);

  // Show detail panel
  const panel = document.getElementById('detailPanel');
  panel.classList.add('visible');
  showDetailView(pkt, currentView);
}

function showDetailView(pkt, view) {
  currentView = view;
  const content = document.getElementById('detailContent');

  // Update tab styles
  document.querySelectorAll('.detail-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });

  if (view === 'headers') {
    const fields = Object.entries(pkt.headers).map(([k, v]) => {
      const isSuspicious = /nmap|p@ssw0rd|password=|exfil|evil\.com|PASS |USER /i.test(v);
      return `<div class="field"><span class="field-name">${k}:</span> <span class="${isSuspicious ? 'suspicious-val' : 'field-val'}">${escHtml(v)}</span></div>`;
    }).join('');
    content.innerHTML = `<div class="field"><span class="field-name">Frame:</span> <span class="field-val">${pkt.len} bytes on wire</span></div>
      <div class="field"><span class="field-name">Source:</span> <span class="field-val">${pkt.src}</span></div>
      <div class="field"><span class="field-name">Destination:</span> <span class="field-val">${pkt.dst}</span></div>
      <div class="field"><span class="field-name">Protocol:</span> <span class="field-val">${pkt.proto}</span></div>
      ${fields}`;
  } else if (view === 'payload') {
    content.innerHTML = pkt.payload ?
      `<pre>${escHtml(pkt.payload.replace(/\\r\\n/g, '\r\n'))}</pre>` :
      '<span style="color:var(--text-muted);">No payload data</span>';
  } else if (view === 'hex') {
    const hex = pkt.hex || '';
    const ascii = hex.split(' ').map(h => {
      const c = parseInt(h, 16);
      return c >= 32 && c <= 126 ? String.fromCharCode(c) : '.';
    }).join('');
    content.innerHTML = `<pre style="display:flex;gap:2rem;"><div>${hex}</div><div style="color:var(--accent-green);">${escHtml(ascii)}</div></pre>`;
  }
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Detail tab switching
document.querySelectorAll('.detail-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (selectedPacket === null) return;
    const pkt = SCENARIOS[currentScenario].packets.find(p => p.no === selectedPacket);
    if (pkt) showDetailView(pkt, tab.dataset.view);
  });
});

// Filter
document.getElementById('filterBtn').addEventListener('click', applyFilter);
document.getElementById('filterInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') applyFilter();
});
document.getElementById('clearFilter').addEventListener('click', () => {
  document.getElementById('filterInput').value = '';
  filteredPackets = null;
  document.getElementById('filterCount').textContent = '';
  renderPackets();
});

function applyFilter() {
  const filter = document.getElementById('filterInput').value.trim().toLowerCase();
  if (!filter) {
    filteredPackets = null;
    renderPackets();
    document.getElementById('filterCount').textContent = '';
    return;
  }

  const s = SCENARIOS[currentScenario];
  filteredPackets = s.packets.filter(p => {
    const text = [p.src, p.dst, p.proto, p.info, JSON.stringify(p.headers), p.payload].join(' ').toLowerCase();

    // Support common Wireshark-style filters
    if (filter.startsWith('ip.src==') || filter.startsWith('ip.src =='))
      return p.src === filter.replace(/ip\.src\s*==\s*/, '').trim();
    if (filter.startsWith('ip.dst==') || filter.startsWith('ip.dst =='))
      return p.dst === filter.replace(/ip\.dst\s*==\s*/, '').trim();
    if (filter.startsWith('tcp.port==') || filter.startsWith('tcp.port ==')) {
      const port = filter.replace(/tcp\.port\s*==\s*/, '').trim();
      const re = new RegExp('(^|\\D)' + port.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(\\D|$)');
      return p.info.includes('→') && (p.info.match(/(\d+)\s*→\s*(\d+)/) || []).slice(1).includes(port);
    }
    if (filter === 'http') return p.proto === 'HTTP';
    if (filter === 'dns') return p.proto === 'DNS';
    if (filter === 'tcp') return ['TCP', 'HTTP', 'FTP', 'SSH'].includes(p.proto);
    if (filter === 'ftp') return p.proto === 'FTP';
    if (filter === 'ssh') return p.proto === 'SSH';
    if (filter === 'arp') return p.proto === 'ARP';
    if (filter.startsWith('tcp.flags.syn==1') || filter === 'syn')
      return p.info.includes('[SYN]') && !p.info.includes('ACK');

    return text.includes(filter);
  });

  renderPackets(filteredPackets);
  document.getElementById('filterCount').textContent = `${filteredPackets.length}/${s.packets.length} packets`;
}

// Submit answer
document.getElementById('submitBtn').addEventListener('click', submitAnswer);
document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

function submitAnswer() {
  const input = document.getElementById('answerInput').value.trim().toLowerCase();
  const fb = document.getElementById('feedbackMsg');
  if (!input) return;

  const s = SCENARIOS[currentScenario];
  let matched = false;

  for (const f of s.findings) {
    if (foundItems[f.id]) continue;
    const keywordMatch = f.keywords.some(k => input.includes(k.toLowerCase()));
    const matchAllMatch = f.matchAll && f.matchAll.every(k => input.includes(k.toLowerCase()));
    if (keywordMatch || matchAllMatch) {
      foundItems[f.id] = true;
      score += f.points;
      matched = true;
      fb.textContent = `FOUND: ${f.label} (+${f.points} pts)`;
      fb.className = 'feedback-msg correct';
      break;
    }
  }

  if (!matched) {
    fb.textContent = 'Not a match. Keep investigating!';
    fb.className = 'feedback-msg wrong';
  }

  document.getElementById('answerInput').value = '';
  updateScoreDisplay();
  renderChecklist();

  // Check victory
  const allFound = s.findings.every(f => foundItems[f.id]);
  if (allFound) {
    completedScenarios.add(currentScenario);
    setTimeout(() => {
      document.getElementById('victoryScreen').classList.add('visible');
      document.getElementById('victoryStats').textContent =
        `Score: ${score} points | Hints used: ${hintsUsed} | Scenario ${currentScenario + 1} of ${SCENARIOS.length}`;
      renderScenarioSelect();
    }, 500);
  }
}

// Hint
document.getElementById('hintBtn').addEventListener('click', () => {
  const s = SCENARIOS[currentScenario];
  const fb = document.getElementById('feedbackMsg');
  const remaining = s.findings.filter(f => !foundItems[f.id]);
  if (remaining.length === 0) return;
  hintsUsed++;
  const hint = remaining[0];
  fb.textContent = `HINT: ${hint.hint}`;
  fb.className = 'feedback-msg hint';
  updateScoreDisplay();
});

// Next scenario
document.getElementById('nextScenarioBtn').addEventListener('click', () => {
  currentScenario = (currentScenario + 1) % SCENARIOS.length;
  loadScenario(currentScenario);
});

function updateScoreDisplay() {
  const s = SCENARIOS[currentScenario];
  const found = s.findings.filter(f => foundItems[f.id]).length;
  document.getElementById('foundCount').textContent = found;
  document.getElementById('totalScore').textContent = score;
  document.getElementById('hintsUsed').textContent = hintsUsed;
}

init();
</script>

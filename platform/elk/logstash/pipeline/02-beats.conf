# ── Beats input (Sysmon, EVTX, generic) on TCP/5044 ───────────────
input {
  beats {
    port => 5044
    type => "beats"
    tags => ["beats"]
  }
}

filter {
  if [type] == "beats" {
    # Sysmon events (Windows Event Log via Winlogbeat)
    if [winlog][provider_name] == "Microsoft-Windows-Sysmon" {
      mutate { add_tag => ["sysmon"] }
      mutate { add_field => { "log_source" => "sysmon" } }
    }

    # Generic EVTX / Windows Event Logs
    if [winlog] and "sysmon" not in [tags] {
      mutate { add_tag => ["evtx"] }
      mutate { add_field => { "log_source" => "evtx" } }
    }
  }
}

output {
  if "sysmon" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "sysmon-%{+YYYY.MM.dd}"
    }
  } else if "evtx" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "evtx-%{+YYYY.MM.dd}"
    }
  } else if [type] == "beats" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "beats-%{+YYYY.MM.dd}"
    }
  }
}

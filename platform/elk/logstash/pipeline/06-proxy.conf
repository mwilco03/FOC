# ── Proxy logs (TCP/5048) ─────────────────────────────────────────
input {
  tcp {
    port  => 5048
    type  => "proxy"
    tags  => ["proxy"]
  }
}

filter {
  if [type] == "proxy" {
    mutate { add_field => { "log_source" => "proxy" } }

    # Try Squid access-log format first
    grok {
      match => { "message" => "%{NUMBER:timestamp}\s+%{NUMBER:duration}\s+%{IPORHOST:src_ip}\s+%{WORD:action}/%{NUMBER:http_status}\s+%{NUMBER:bytes}\s+%{WORD:http_method}\s+%{URI:url}\s+%{USERNAME:user}\s+%{WORD:hierarchy}/%{IPORHOST:dst_host}\s+%{GREEDYDATA:content_type}" }
      tag_on_failure => ["_proxy_squid_parse_fail"]
    }

    # Fallback: Blue Coat / generic "YYYY-MM-DD HH:MM:SS" prefixed CSV
    if "_proxy_squid_parse_fail" in [tags] {
      grok {
        match => { "message" => "%{TIMESTAMP_ISO8601:proxy_timestamp}\s+%{GREEDYDATA:raw_proxy}" }
        tag_on_failure => ["_proxy_parse_fail"]
      }
      if [proxy_timestamp] {
        date {
          match => ["proxy_timestamp", "ISO8601"]
          target => "@timestamp"
        }
      }
    }
  }
}

output {
  if [type] == "proxy" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "proxy-%{+YYYY.MM.dd}"
    }
  }
}

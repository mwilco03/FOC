# ── WSUS logs (TCP/5049) ──────────────────────────────────────────
input {
  tcp {
    port  => 5049
    type  => "wsus"
    tags  => ["wsus"]
    codec => json_lines
  }
}

filter {
  if [type] == "wsus" {
    mutate { add_field => { "log_source" => "wsus" } }

    if [TimeOfEvent] {
      date {
        match => ["TimeOfEvent", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
        target => "@timestamp"
      }
    }

    # Normalize common WSUS fields
    mutate {
      rename => {
        "ComputerName" => "hostname"
        "UpdateTitle"  => "update_title"
        "UpdateId"     => "update_id"
        "KBArticleId"  => "kb_article"
      }
    }
  }
}

output {
  if [type] == "wsus" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "wsus-%{+YYYY.MM.dd}"
    }
  }
}

# ── Tenable / Nessus (JSON over TCP/5050) ─────────────────────────
input {
  tcp {
    port  => 5050
    type  => "tenable"
    tags  => ["tenable"]
    codec => json_lines
  }
}

filter {
  if [type] == "tenable" {
    mutate { add_field => { "log_source" => "tenable" } }

    if [plugin_output] {
      mutate { add_tag => ["vulnerability"] }
    }

    # Normalize severity
    if [severity] {
      mutate { convert => { "severity" => "integer" } }
    }

    # Normalize common Tenable fields
    mutate {
      rename => {
        "host-ip"      => "dst_ip"
        "host-fqdn"    => "dst_hostname"
        "plugin_name"  => "vuln_name"
        "plugin_id"    => "vuln_plugin_id"
        "risk_factor"  => "vuln_risk"
        "cvss_base_score" => "cvss_score"
      }
    }
  }
}

output {
  if [type] == "tenable" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "tenable-%{+YYYY.MM.dd}"
    }
  }
}

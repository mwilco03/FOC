# ── McAfee (JSON over TCP/5047) ───────────────────────────────────
input {
  tcp {
    port  => 5047
    type  => "mcafee"
    tags  => ["mcafee"]
    codec => json_lines
  }
}

filter {
  if [type] == "mcafee" {
    mutate { add_field => { "log_source" => "mcafee" } }

    # McAfee ePO / ENS events often include these fields
    if [event.timestamp] {
      date {
        match => ["event.timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
        target => "@timestamp"
      }
    }

    if [ThreatName] {
      mutate { add_tag => ["threat_detected"] }
    }
  }
}

output {
  if [type] == "mcafee" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "mcafee-%{+YYYY.MM.dd}"
    }
  }
}

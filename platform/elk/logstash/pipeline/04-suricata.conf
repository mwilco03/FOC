# ── Suricata (JSON over TCP/5046) ─────────────────────────────────
input {
  tcp {
    port  => 5046
    type  => "suricata"
    tags  => ["suricata"]
    codec => json_lines
  }
}

filter {
  if [type] == "suricata" {
    mutate { add_field => { "log_source" => "suricata" } }

    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    if [event_type] == "alert" {
      mutate { add_tag => ["alert", "ids"] }
    }

    # Normalize network fields
    mutate {
      rename => {
        "src_ip"   => "src_ip"
        "src_port" => "src_port"
        "dest_ip"  => "dst_ip"
        "dest_port"=> "dst_port"
      }
    }
  }
}

output {
  if [type] == "suricata" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "suricata-%{+YYYY.MM.dd}"
    }
  }
}

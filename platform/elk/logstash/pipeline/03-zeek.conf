# ── Zeek (JSON over TCP/5045) ─────────────────────────────────────
input {
  tcp {
    port  => 5045
    type  => "zeek"
    tags  => ["zeek"]
    codec => json_lines
  }
}

filter {
  if [type] == "zeek" {
    mutate { add_field => { "log_source" => "zeek" } }

    # Parse Zeek timestamp (epoch float)
    if [ts] {
      date {
        match => ["ts", "UNIX"]
        target => "@timestamp"
      }
      mutate { remove_field => ["ts"] }
    }

    # Rename Zeek's id fields to avoid conflicts
    if [id.orig_h] {
      mutate {
        rename => {
          "id.orig_h" => "src_ip"
          "id.orig_p" => "src_port"
          "id.resp_h" => "dst_ip"
          "id.resp_p" => "dst_port"
        }
      }
    }
  }
}

output {
  if [type] == "zeek" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "zeek-%{+YYYY.MM.dd}"
    }
  }
}

version: "3.8"

services:
  # ── Elasticsearch ───────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELK_VERSION:-8.13.4}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=foc-elk
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # ── Logstash ────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:${ELK_VERSION:-8.13.4}
    container_name: logstash
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline/:/usr/share/logstash/pipeline/:ro
      - ./logstash/patterns/:/usr/share/logstash/patterns/:ro
    ports:
      # Syslog
      - "514:514/tcp"
      - "514:514/udp"
      # Beats (Sysmon / EVTX / generic)
      - "5044:5044"
      # Zeek
      - "5045:5045"
      # Suricata
      - "5046:5046"
      # McAfee
      - "5047:5047"
      # Proxy logs
      - "5048:5048"
      # WSUS
      - "5049:5049"
      # Tenable
      - "5050:5050"
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ── Kibana ──────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:${ELK_VERSION:-8.13.4}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  es_data:
    driver: local

networks:
  elk:
    driver: bridge
